name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install package with dev + server extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"
      - name: Run tests
        run: pytest -q
